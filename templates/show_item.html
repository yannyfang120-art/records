<!DOCTYPE html>
<html>

<head>
  <title>{{ item.album }}</title>
</head>

<body>
  <h1>{{ item.album }}</h1>

   {% if session.get("user_id") == item.user_id %}
    <p>
     <a href ="/edit_item/{{ item.id }}">Muokkaa</a>
    </p>
  {% endif %}

  <p>
    Artisti: {{ item.artist }}
  </p>
  <p>
    Arvostelu: {{ item.review }} 
  </p>
  <p>
    Arvosana (1-10): {{ item.review_points}}  
  </p>
  <p>
    Arvostelija: {{ item.username }}
  </p> 
  <p>
    <a href="/">Takaisin</a>

 </body>

</html>
