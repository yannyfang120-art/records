{% extends "layout.html" %}

{% block title %}Käyttäjä {{ user.username }}{% endblock %}

{% block content %}
  <h2>Käyttäjä {{ user.username }}</h2>
  <p>
    Käyttäjällä on yhteensä {{ items | count }} ilmoitusta. 
  </p>

  <h3>Ilmoitukset</h3>

  <ul>
    {% for item in items %}
    <li><a href="/item/{{ item.id }}">{{ item.album}} </a></li>
    {% endfor %}
  </ul>

{% endblock %}
