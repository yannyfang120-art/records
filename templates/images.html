<!DOCTYPE html>
<html>

<head>
  <title>Albumin kansikuva</title>
</head>

<body>
  <h1>Albumin kansikuva</h1>

  <h2>Päivitä kuva</h2>
  <form action="/add_image" method="post" enctype="multipart/form-data">
    <p>
      Kuva: <input type="file" name="image" accept=".png" />
    </p>
    <input type="hidden" name="item_id" value="{{ item.id }}">
    <input type="submit" value="Lähetä" />
  </form>

  {% if image %}
    <h2>Nykyinen kuva</h2>
    <img src="/image/{{ image.id }}" width="200">
  {% else %}
    <p>Ei kuvaa vielä</p>
  {% endif %}
   
  <p>
    <a href="/item/{{ item.id }}">Takaisin</a>

 </body>

</html>
